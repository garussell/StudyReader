<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Study Reader PDF</title>
    <link rel="stylesheet" href="pdf-reader.css">
  </head>
  <body>
    <div class="sticky-shell">
      <header class="topbar">
        <div class="title">
          <h1>Study Reader PDF</h1>
          <p id="fileName">Open a local PDF to begin.</p>
        </div>
        <label class="file-control" for="pdfFile">Open PDF</label>
        <input id="pdfFile" class="visually-hidden" type="file" accept="application/pdf,.pdf">
      </header>

      <section class="reader-controls" aria-label="PDF reader controls">
        <div class="control-group" aria-label="Playback controls">
          <p class="group-label">Playback</p>
          <div class="control-row">
            <button id="play" class="primary" type="button">Play</button>
            <button id="pause" type="button">Pause</button>
            <button id="resume" type="button">Resume</button>
            <button id="stop" class="danger" type="button">Stop</button>
          </div>
        </div>

        <div class="control-group" aria-label="Sentence controls">
          <p class="group-label">Sentence</p>
          <div class="control-row">
            <button id="previousSentence" type="button">Previous Sentence</button>
            <button id="nextSentence" type="button">Next Sentence</button>
          </div>
        </div>

        <div class="control-group" aria-label="Paragraph controls">
          <p class="group-label">Paragraph</p>
          <div class="control-row">
            <button id="previousParagraph" type="button">Previous Paragraph</button>
            <button id="nextParagraph" type="button">Next Paragraph</button>
          </div>
        </div>

        <div class="control-group" aria-label="Page controls">
          <p class="group-label">Page</p>
          <div class="control-row">
            <button id="previousPage" type="button">Previous Page</button>
            <button id="nextPage" type="button">Next Page</button>
          </div>
        </div>

        <div class="control-group" aria-label="Save controls">
          <p class="group-label">Save</p>
          <div class="control-row">
            <button id="saveSentence" type="button">Save Sentence</button>
            <button id="saveParagraph" type="button">Save Paragraph</button>
          </div>
        </div>

        <div class="control-group" aria-label="Reader tools">
          <p class="group-label">Tools</p>
          <div class="control-row">
            <button id="showPreview" type="button">Show Extracted Text Preview</button>
            <button id="showNavigator" type="button">Show Reading Navigator</button>
          </div>
        </div>

        <div class="setting-group" aria-label="Speech speed control">
          <label for="rate">Speed <span id="rateValue">1.0x</span></label>
          <input id="rate" type="range" min="0.5" max="2" step="0.1" value="1">
        </div>

        <div class="setting-group setting-group-voice" aria-label="Voice selection">
          <label for="voice">Voice</label>
          <select id="voice">
            <option value="">Default voice</option>
          </select>
        </div>

        <div class="setting-group setting-group-layout" aria-label="Reading layout">
          <label for="layoutMode">Layout</label>
          <select id="layoutMode">
            <option value="auto">Auto</option>
            <option value="single">Single column</option>
            <option value="two">Two columns</option>
          </select>
        </div>

        <div class="setting-group setting-group-theme" aria-label="Theme selection">
          <label for="theme">Theme</label>
          <select id="theme">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </div>

        <div class="control-group control-group-behavior" aria-label="Behavior settings">
          <p class="group-label">Behavior</p>
          <div class="toggle-list">
            <label class="toggle-option" for="followReading">
              <span class="toggle-option-text">Follow reading position</span>
              <input id="followReading" type="checkbox" checked>
            </label>
            <div id="filterMenuWrap" class="filter-menu-wrap">
              <button
                id="filterMenuButton"
                class="filter-menu-button"
                type="button"
                aria-haspopup="true"
                aria-expanded="false"
                aria-controls="filterMenuPanel"
              >
                <span>Reading Filters</span>
                <span id="filterMenuSummary" class="filter-menu-summary">Off</span>
              </button>
              <div id="filterMenuPanel" class="filter-menu-panel" hidden>
                <div class="filter-menu-header">
                  <p class="filter-menu-title">Reading Filters</p>
                  <p class="filter-menu-subtitle">Affects spoken text only.</p>
                </div>
                <div class="filter-menu-list">
                  <label class="filter-option" for="skipCitations">
                    <span class="filter-option-text">Skip citations</span>
                    <input id="skipCitations" type="checkbox">
                  </label>
                  <label class="filter-option" for="skipParentheticalText">
                    <span class="filter-option-text">Skip parenthetical text</span>
                    <input id="skipParentheticalText" type="checkbox">
                  </label>
                  <label class="filter-option" for="skipBracketCitations">
                    <span class="filter-option-text">Skip bracket citations</span>
                    <input id="skipBracketCitations" type="checkbox">
                  </label>
                  <label class="filter-option" for="skipUrlsDois">
                    <span class="filter-option-text">Skip URLs/DOIs</span>
                    <input id="skipUrlsDois" type="checkbox">
                  </label>
                  <label class="filter-option" for="skipFigureTableReferences">
                    <span class="filter-option-text">Skip figure/table references</span>
                    <input id="skipFigureTableReferences" type="checkbox">
                  </label>
                  <label class="filter-option" for="stopBeforeReferencesSection">
                    <span class="filter-option-text">Stop before References section</span>
                    <input id="stopBeforeReferencesSection" type="checkbox">
                  </label>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="compact-toolbar-status" aria-live="polite">
          <span id="compactStatus">Ready</span>
        </div>
      </section>
    </div>

    <main class="reader-content">
      <section class="pdf-pane" aria-label="PDF page">
        <div id="canvasWrap" class="canvas-wrap">
          <canvas id="pdfCanvas"></canvas>
        </div>
      </section>

      <aside class="study-pane" aria-label="Extracted PDF text">
        <section class="text-panel" aria-label="Extracted PDF text">
          <div class="text-heading">
            <h2>Page Text</h2>
            <p id="readerStatus">Ready</p>
          </div>
          <div id="textChunks" class="text-chunks"></div>
        </section>
      </aside>
    </main>

    <dialog id="textPreviewDialog" class="preview-dialog">
      <div class="preview-dialog-body">
        <div class="preview-dialog-header">
          <h2>Extracted Text Preview</h2>
          <button id="closePreview" type="button">Close</button>
        </div>
        <p id="textPreviewMeta" class="preview-dialog-meta">No PDF loaded.</p>
        <pre id="textPreviewContent" class="preview-dialog-content">No extracted text available.</pre>
      </div>
    </dialog>

    <dialog id="readingNavigatorDialog" class="preview-dialog navigator-dialog">
      <div class="preview-dialog-body navigator-dialog-body">
        <div class="preview-dialog-header">
          <div>
            <h2>Reading Navigator</h2>
            <p id="readingNavigatorMeta" class="preview-dialog-meta">No PDF loaded.</p>
          </div>
          <button id="closeNavigator" type="button">Close</button>
        </div>
        <label class="navigator-search-label" for="navigatorSearch">Search paragraphs</label>
        <input id="navigatorSearch" class="navigator-search-input" type="search" placeholder="Filter by page or paragraph text">
        <div id="readingNavigatorList" class="navigator-list" aria-live="polite"></div>
      </div>
    </dialog>

    <script src="shared-prefs.js"></script>
    <script src="shared-snippets.js"></script>
    <script src="shared-theme.js"></script>
    <script type="module" src="pdf-reader.mjs"></script>
  </body>
</html>
